<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<!-- Per rendere adattabile a tutti i dispositivi -->
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<!-- Titolo visibile nel tab del browser -->
<title>Jonathan Guirguis - Profilo</title>
<!-- Font Awesome per le icone dei social -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<!-- Precaricamento Google Fonts per performance -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<!-- Importazione font Poppins da Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

html {
  scroll-behavior: smooth;
}

body {
  font-family: 'Poppins', sans-serif;
  background: linear-gradient(135deg, #cce7ff 0%, #e6f2ff 50%, #b3d9ff 100%);
  background-attachment: fixed;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 40px 20px;
  transition: background-color 0.6s cubic-bezier(0.4, 0, 0.2, 1), 
              background-image 0.6s cubic-bezier(0.4, 0, 0.2, 1);
  min-height: 100vh;
  color: #1a202c;
  overflow-x: hidden;
  position: relative;
}

.background-animation {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: -1;
  pointer-events: none;
  background: 
    radial-gradient(circle at 20% 50%, rgba(255, 255, 255, 0.3) 0%, transparent 50%),
    radial-gradient(circle at 80% 80%, rgba(52, 152, 219, 0.15) 0%, transparent 50%);
  animation: floatBg 20s ease-in-out infinite;
}

@keyframes floatBg {
  0%, 100% {
    transform: translateY(0px) translateX(0px);
  }
  50% {
    transform: translateY(-30px) translateX(20px);
  }
}

header {
  text-align: center;
  margin-bottom: 40px;
  animation: slideDownHeader 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
  position: relative;
  z-index: 10;
}

@keyframes slideDownHeader {
  from {
    opacity: 0;
    transform: translateY(-50px);
    filter: blur(10px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
    filter: blur(0);
  }
}

.header-content {
  backdrop-filter: blur(16px);
  background: rgba(255, 255, 255, 0.25);
  padding: 50px 40px;
  border-radius: 30px;
  border: 1.5px solid rgba(255, 255, 255, 0.35);
  box-shadow: 
    0 8px 32px rgba(0, 0, 0, 0.1),
    inset 0 0 20px rgba(255, 255, 255, 0.2);
  position: relative;
  overflow: hidden;
}

.header-content::before {
  content: '';
  position: absolute;
  top: -50%;
  right: -50%;
  width: 100%;
  height: 100%;
  background: radial-gradient(circle, rgba(255, 255, 255, 0.1) 0%, transparent 70%);
  animation: rotateGradient 20s linear infinite;
}

@keyframes rotateGradient {
  0% {
    transform: rotate(0deg);
  }
  100% {
    transform: rotate(360deg);
  }
}

.profile-wrapper {
  position: relative;
  display: inline-block;
  margin-bottom: 20px;
}

.profile-img {
  width: 160px;
  height: 160px;
  border-radius: 50%;
  border: 5px solid rgba(255, 255, 255, 0.8);
  box-shadow: 
    0 10px 40px rgba(52, 152, 219, 0.3),
    0 0 0 2px rgba(52, 152, 219, 0.1);
  object-fit: cover;
  animation: popInScale 0.7s cubic-bezier(0.68, -0.55, 0.265, 1.55);
  transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
  position: relative;
  z-index: 2;
}

@keyframes popInScale {
  0% {
    opacity: 0;
    transform: scale(0.3) rotate(-180deg);
    filter: blur(10px);
  }
  50% {
    transform: scale(1.05);
  }
  100% {
    opacity: 1;
    transform: scale(1) rotate(0deg);
    filter: blur(0);
  }
}

.profile-img:hover {
  transform: scale(1.15) rotate(8deg);
}
</style>
</head>
<body>

<!-- Bottone luce/notte posizionato fisso in alto a destra -->
<div class="theme-switch">
<!-- Bottone per attivare/disattivare dark mode -->
<button id="theme-toggle">🌙 Modalità Notte</button>
</div>

<!-- Sfondo animato -->
<div class="background-animation"></div>

<header>
<!-- Wrapper principale che contiene tutto l'header -->
<div class="header-content">
<!-- Wrapper per l'immagine profilo con effetti di animazione -->
<div class="profile-wrapper">
<!-- Immagine profilo circolare con animazione di entrata -->
<img src="https://i.imgur.com/9PNOJ05.jpeg" alt="Foto Profilo di Jonathan" class="profile-img">
</div>
<h1>@_jonathan_guirguis_</h1>
<p class="subtitle">Studente del Liceo Scientifico</p>
<p class="subtitle-secondary">Opzioni Scienze Applicate</p>
<!-- Linea decorativa che separa il contenuto dell'header -->
<div class="divider"></div>
</div>
</header>

<script>
/* Bottone per cambiare tema luce/scurità */
const pulsante = document.getElementById('theme-toggle');
const corpo = document.body;
const bottoniFlex = document.querySelectorAll('.btn');
/* Messaggio di benvenuto */
alert("Benvenuto nel mio Linktree!");
</script>

</body>
</html>
